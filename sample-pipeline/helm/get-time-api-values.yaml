nameOverride: "get-time-api"

replicaCount: 1

image:
  repository: careromspersonal/cpp-api-query-multiple-timezone
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []

service:
  enabled: true
  port: 80
  targetPort: 3333

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  hosts:
    - host: get-time.my-ubuntu.hello
      paths:
        - path: /api(/|$)(.*)
          pathType: ImplementationSpecific
  tls: []

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
