projectConfigs:
  cpp-api-query-multiple-timezone:
    helmName: "get-time-api"
    dockerRegistry: "cpp-api-query-multiple-timezone"

  nodejs-query-multiple-timezone-gui:
    helmName: "get-time-web"
    dockerRegistry: "nodejs-query-multiple-timezone-gui"

branchConfigs:
  main:
    dockerTag: "latest"
    namespace: "default"
    ingressHost: "get-time.my-ubuntu.hello"
  uat:
    dockerTag: "uat"
    namespace: "uat"
    ingressHost: "uat-get-time.my-ubuntu.hello"
  dev:
    dockerTag: "dev"
    namespace: "dev"
    ingressHost: "dev-get-time.my-ubuntu.hello"